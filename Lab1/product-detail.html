<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Xem chi tiết sản phẩm tại KoraStore" />
  <title>Chi tiết sản phẩm – KoraStore</title>

  <!-- Bootstrap 5 CSS -->
  <link href="../node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Inter', sans-serif; background: #f0f2fa; color: #1a1d2e; }

    /* ---- Navbar ---- */
    .navbar { background: rgba(240,242,250,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(91,79,255,0.15); }
    .navbar-brand { font-weight: 800; font-size: 1.3rem; color: #1a1d2e !important; }
    .navbar-brand .brand-bolt { color: #5b4fff; margin-right: 4px; }

    /* ---- Breadcrumb ---- */
    .breadcrumb-area { background: transparent; padding: 1.2rem 0 0; }
    .breadcrumb-item a { color: #5b4fff; text-decoration: none; }
    .breadcrumb-item.active { color: #5a6282; }

    /* ---- Detail Card ---- */
    .detail-card {
      background: #fff;
      border-radius: 1.1rem;
      box-shadow: 0 4px 32px rgba(91,79,255,0.1);
      overflow: hidden;
      margin-bottom: 2rem;
    }

    /* Image column */
    .detail-img-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 1.1rem 0 0 1.1rem;
      min-height: 420px;
      background: #f5f6fb;
    }
    .detail-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .detail-img-wrap:hover img { transform: scale(1.04); }

    .detail-badge {
      position: absolute; top: 1rem; left: 1rem;
      padding: 0.3rem 0.8rem; border-radius: 3rem;
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      background: linear-gradient(135deg,#5b4fff,#4338e0);
      color: #fff; box-shadow: 0 2px 10px rgba(91,79,255,0.45);
    }
    .detail-badge--sale { background: linear-gradient(135deg,#ff3f61,#cc3a5a); box-shadow: 0 2px 10px rgba(255,63,97,0.45); }

    /* Info column */
    .detail-info { padding: 2.5rem 2rem; }
    .detail-category {
      font-size: 0.75rem; font-weight: 700;
      color: #5b4fff; text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 0.5rem;
    }
    .detail-name { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.75rem; }
    .detail-rating { color: #e0920a; font-size: 0.9rem; margin-bottom: 1rem; }
    .detail-rating span { color: #5a6282; margin-left: 0.25rem; font-size: 0.82rem; }

    .detail-price-current { font-size: 1.9rem; font-weight: 800; color: #e8000d; }
    .detail-price-old { font-size: 1rem; color: #9099b8; text-decoration: line-through; margin-left: 0.5rem; }
    .detail-discount-tag {
      display: inline-block; background: #fff0f3; color: #ff3f61;
      border: 1px solid rgba(255,63,97,0.25); border-radius: 3rem;
      font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.65rem;
      margin-left: 0.5rem; vertical-align: middle;
    }

    .detail-desc { color: #5a6282; line-height: 1.75; font-size: 0.95rem; margin: 1.25rem 0; }

    /* Specs table */
    .specs-table th { width: 38%; font-weight: 600; color: #1a1d2e; background: #f5f6fb; }
    .specs-table td { color: #5a6282; }
    .specs-table th, .specs-table td { padding: 0.55rem 0.9rem; font-size: 0.88rem; }

    /* Action buttons */
    .btn-add-cart {
      background: linear-gradient(135deg,#5b4fff,#ff3f61);
      border: none; color: #fff; border-radius: 3rem;
      padding: 0.75rem 2rem; font-weight: 700; font-size: 1rem;
      box-shadow: 0 4px 20px rgba(91,79,255,0.35);
      transition: all 0.3s ease;
    }
    .btn-add-cart:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(91,79,255,0.5); color:#fff; }

    .btn-back {
      border: 2px solid rgba(91,79,255,0.35); color: #5b4fff;
      border-radius: 3rem; padding: 0.72rem 1.75rem;
      font-weight: 600; background: transparent; transition: all 0.25s;
    }
    .btn-back:hover { background: #5b4fff; color: #fff; border-color: #5b4fff; transform: translateY(-2px); }

    /* Related products */
    .related-card {
      border: 1px solid rgba(100,110,180,0.14); border-radius: 1rem;
      overflow: hidden; background: #fff;
      box-shadow: 0 2px 12px rgba(91,79,255,0.06);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
      cursor: pointer; text-decoration: none; color: inherit;
    }
    .related-card:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(91,79,255,0.14); color: inherit; }
    .related-img { width:100%; height:160px; object-fit:cover; }
    .related-price { font-weight: 800; color: #e8000d; }

    /* Stock badge */
    .in-stock { color: #16a34a; font-weight: 600; font-size: 0.85rem; }

    @media (max-width: 767px) {
      .detail-img-wrap { min-height: 260px; border-radius: 1.1rem 1.1rem 0 0; }
      .detail-info { padding: 1.5rem; }
      .detail-name { font-size: 1.4rem; }
    }
  </style>
</head>

<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="fa-solid fa-bolt brand-bolt"></i>Kora<strong>Store</strong>
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item">
            <a class="nav-link" href="index.html#home"><i class="fa-solid fa-house me-1"></i>Trang chủ</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="index.html#products"><i class="fa-solid fa-box-open me-1"></i>Sản phẩm</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="index.html#contact"><i class="fa-solid fa-envelope me-1"></i>Liên hệ</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Breadcrumb -->
    <nav class="breadcrumb-area" aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
        <li class="breadcrumb-item"><a href="index.html#products">Sản phẩm</a></li>
        <li class="breadcrumb-item active" id="bc-name">Chi tiết</li>
      </ol>
    </nav>

    <!-- ===== DETAIL CARD ===== -->
    <div class="detail-card mt-2">
      <div class="row g-0">
        <!-- Image -->
        <div class="col-md-6">
          <div class="detail-img-wrap h-100">
            <div class="detail-badge" id="d-badge" style="display:none"></div>
            <img id="d-img" src="" alt="" />
          </div>
        </div>
        <!-- Info -->
        <div class="col-md-6">
          <div class="detail-info">
            <div class="detail-category" id="d-category"></div>
            <h1 class="detail-name" id="d-name"></h1>

            <div class="detail-rating" id="d-rating"></div>

            <div class="mb-3">
              <span class="detail-price-current" id="d-price"></span>
              <span class="detail-price-old" id="d-price-old"></span>
              <span class="detail-discount-tag" id="d-discount" style="display:none"></span>
            </div>

            <p class="in-stock"><i class="fa-solid fa-circle-check me-1"></i>Còn hàng – Giao hàng trong 1–2 ngày</p>

            <p class="detail-desc" id="d-desc"></p>

            <!-- Specs -->
            <div class="mb-4">
              <h6 class="fw-700 mb-2" style="font-weight:700">Thông số nổi bật</h6>
              <table class="table specs-table table-bordered table-sm rounded overflow-hidden">
                <tbody id="d-specs"></tbody>
              </table>
            </div>

            <!-- Quantity + Actions -->
            <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
              <div class="input-group" style="width:130px">
                <button class="btn btn-outline-secondary" type="button" id="btn-minus">−</button>
                <input type="number" class="form-control text-center" id="qty" value="1" min="1" max="99" />
                <button class="btn btn-outline-secondary" type="button" id="btn-plus">+</button>
              </div>
              <button class="btn btn-add-cart flex-grow-1" id="btn-cart">
                <i class="fa-solid fa-cart-shopping me-2"></i>Thêm vào giỏ hàng
              </button>
            </div>

            <!-- Back button -->
            <a href="index.html#products" class="btn btn-back">
              <i class="fa-solid fa-arrow-left me-2"></i>Tiếp tục mua sắm
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== RELATED PRODUCTS ===== -->
    <h2 class="fw-800 mb-3" style="font-weight:800;font-size:1.4rem">Sản phẩm liên quan</h2>
    <div class="row g-3 mb-5" id="related-grid"></div>
  </div>

  <!-- Toast notification -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="cartToast" class="toast align-items-center text-bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body fw-600">
          <i class="fa-solid fa-circle-check me-2"></i>Đã thêm vào giỏ hàng!
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ===== Product Data =====
    const PRODUCTS = {
      1: {
        name: 'iPhone 15 Pro Max',
        category: 'Điện thoại',
        badge: 'Mới',
        badgeType: '',
        img: 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800&h=600&fit=crop&auto=format',
        price: '34.990.000₫',
        priceOld: '39.990.000₫',
        discount: '-13%',
        rating: 4.5,
        reviews: 312,
        desc: 'iPhone 15 Pro Max là chiếc flagship đỉnh cao nhất của Apple năm 2023, được trang bị chip A17 Pro — con chip di động mạnh nhất thế giới với hiệu năng GPU vượt trội. Camera 48MP với cảm biến lớn hơn, khẩu độ f/1.78, hỗ trợ quay video ProRes 4K 60fps. Khung titan Grade 5, nhẹ và bền hơn thép không gỉ. Màn hình 6.7" Super Retina XDR với ProMotion 120Hz luôn mượt mà.',
        specs: [
          ['Chip', 'Apple A17 Pro (3nm)'],
          ['Màn hình', '6.7" Super Retina XDR, 120Hz'],
          ['Camera sau', '48MP + 12MP + 12MP'],
          ['Pin', '4.422 mAh, sạc nhanh 27W'],
          ['Bộ nhớ', '256GB / 512GB / 1TB'],
          ['Hệ điều hành', 'iOS 17']
        ]
      },
      2: {
        name: 'MacBook Pro 14" M3',
        category: 'Laptop',
        badge: '-20%',
        badgeType: 'sale',
        img: 'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=800&h=600&fit=crop&auto=format',
        price: '44.990.000₫',
        priceOld: '54.990.000₫',
        discount: '-20%',
        rating: 5.0,
        reviews: 189,
        desc: 'MacBook Pro 14" với chip Apple M3 thế hệ mới mang đến hiệu năng đột phá trong thiết kế siêu mỏng. CPU 8 nhân, GPU 10 nhân xử lý mọi tác vụ sáng tạo từ biên tập video 8K đến thiết kế 3D. Màn hình Liquid Retina XDR 3024×1964px, 1000 nit brightness, hỗ trợ ProMotion. Pin cực trâu lên đến 22 giờ sử dụng liên tục.',
        specs: [
          ['Chip', 'Apple M3 (3nm)'],
          ['RAM', '8GB / 16GB / 24GB Unified Memory'],
          ['Màn hình', '14.2" Liquid Retina XDR, 120Hz'],
          ['SSD', '512GB / 1TB / 2TB'],
          ['Pin', '70Wh, tối đa 22 giờ'],
          ['Cổng kết nối', '3× Thunderbolt 4, HDMI, SD card']
        ]
      },
      3: {
        name: 'Sony WH-1000XM5',
        category: 'Âm thanh',
        badge: '',
        badgeType: '',
        img: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&h=600&fit=crop&auto=format',
        price: '7.990.000₫',
        priceOld: '9.490.000₫',
        discount: '-16%',
        rating: 4.0,
        reviews: 256,
        desc: 'Sony WH-1000XM5 là chuẩn mực mới của tai nghe chống ồn cao cấp. Trang bị 8 microphone và 2 chip xử lý tín hiệu HD, khả năng chống ồn chủ động (ANC) vô đối trên thị trường. Driver 30mm cho âm thanh Hi-Res Audio Wireless. Kết nối đa điểm với 2 thiết bị cùng lúc, pin 30 giờ, sạc nhanh 3 phút được 3 giờ nghe.',
        specs: [
          ['Driver', '30mm, Hi-Res Audio'],
          ['ANC', '8 microphone, 2 chip xử lý'],
          ['Pin', '30 giờ (ANC bật)'],
          ['Kết nối', 'Bluetooth 5.2, Multipoint'],
          ['Codec', 'SBC, AAC, LDAC'],
          ['Trọng lượng', '250g']
        ]
      },
      4: {
        name: 'Samsung Galaxy Watch 7',
        category: 'Wearable',
        badge: 'Hot',
        badgeType: '',
        img: 'https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=800&h=600&fit=crop&auto=format',
        price: '6.490.000₫',
        priceOld: '7.990.000₫',
        discount: '-19%',
        rating: 4.5,
        reviews: 143,
        desc: 'Galaxy Watch 7 là đỉnh cao thiết bị đeo thông minh của Samsung. Chip Exynos W1000 mang đến hiệu suất nhanh hơn 3.8 lần, theo dõi sức khoẻ toàn diện với cảm biến BioActive Gen 3. Đo đường huyết, SpO2, ECG, nhịp tim 24/7. Chống nước 5ATM + MIL-STD-810H, vỏ nhôm siêu nhẹ, GPS chính xác cao, pin 40 giờ.',
        specs: [
          ['Chip', 'Exynos W1000 (3nm)'],
          ['Màn hình', '1.5" Super AMOLED, 480×480px'],
          ['Pin', 'Tối đa 40 giờ'],
          ['Chống nước', '5ATM + IP68'],
          ['Cảm biến', 'BioActive Gen 3, GPS, SpO2, ECG'],
          ['Kết nối', 'Bluetooth 5.3, Wi-Fi, NFC']
        ]
      },
      5: {
        name: 'iPad Air M2 11"',
        category: 'Máy tính bảng',
        badge: '-15%',
        badgeType: 'sale',
        img: 'https://images.unsplash.com/photo-1585770536735-27993a5b5b87?w=800&h=600&fit=crop&auto=format',
        price: '18.490.000₫',
        priceOld: '21.490.000₫',
        discount: '-15%',
        rating: 4.7,
        reviews: 98,
        desc: 'iPad Air M2 11" là sự cân bằng hoàn hảo giữa hiệu năng và di động. Chip Apple M2 với CPU 8 nhân, GPU 9 nhân, Neural Engine 16 nhân xử lý AI cực nhanh. Màn hình Liquid Retina 11" sắc nét 2360×1640px, True Tone, P3 wide color. Hỗ trợ Apple Pencil Pro với cảm biến lực và Squeeze gesture. Magic Keyboard chính hãng.',
        specs: [
          ['Chip', 'Apple M2'],
          ['Màn hình', '11" Liquid Retina, 264ppi'],
          ['RAM', '8GB Unified Memory'],
          ['Storage', '128GB / 256GB / 512GB / 1TB'],
          ['Camera', '12MP sau, 12MP trước (UW)'],
          ['Pin', '28.65Wh, tối đa 10 giờ']
        ]
      },
      6: {
        name: 'ASUS ROG Zephyrus G16',
        category: 'Gaming',
        badge: '',
        badgeType: '',
        img: 'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=800&h=600&fit=crop&auto=format',
        price: '62.990.000₫',
        priceOld: '68.000.000₫',
        discount: '-8%',
        rating: 4.9,
        reviews: 74,
        desc: 'ASUS ROG Zephyrus G16 là laptop gaming mỏng nhẹ cao cấp nhất của ROG. RTX 4080 Laptop GPU 175W với MUX Switch và Advanced Optimus, Intel Core i9-14900HX 24 nhân. RAM DDR5 32GB, SSD PCIe 4.0 1TB. Màn hình QHD 2560×1600px 240Hz với độ phủ màu DCI-P3 100%, ROG Nebula Display Pro.',
        specs: [
          ['CPU', 'Intel Core i9-14900HX'],
          ['GPU', 'NVIDIA GeForce RTX 4080 175W'],
          ['RAM', '32GB DDR5-4800'],
          ['Màn hình', '16" QHD 2560×1600, 240Hz'],
          ['SSD', '1TB PCIe 4.0 NVMe'],
          ['Pin', '90Wh, sạc 240W']
        ]
      }
    };

    // ===== Render product =====
    function renderStars(rating) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i) html += '<i class="fa-solid fa-star"></i>';
        else if (rating >= i - 0.5) html += '<i class="fa-solid fa-star-half-stroke"></i>';
        else html += '<i class="fa-regular fa-star"></i>';
      }
      return html;
    }

    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id')) || 1;
    const p = PRODUCTS[id];

    if (p) {
      document.title = p.name + ' – KoraStore';
      document.getElementById('bc-name').textContent = p.name;
      document.getElementById('d-category').textContent = p.category;
      document.getElementById('d-name').textContent = p.name;
      document.getElementById('d-img').src = p.img;
      document.getElementById('d-img').alt = p.name;
      document.getElementById('d-price').textContent = p.price;
      document.getElementById('d-price-old').textContent = p.priceOld;
      document.getElementById('d-desc').textContent = p.desc;

      const discountEl = document.getElementById('d-discount');
      discountEl.textContent = p.discount;
      discountEl.style.display = 'inline-block';

      document.getElementById('d-rating').innerHTML =
        renderStars(p.rating) + `<span>${p.rating.toFixed(1)} (${p.reviews} đánh giá)</span>`;

      if (p.badge) {
        const badgeEl = document.getElementById('d-badge');
        badgeEl.textContent = p.badge;
        badgeEl.style.display = 'block';
        if (p.badgeType === 'sale') badgeEl.classList.add('detail-badge--sale');
      }

      const specsBody = document.getElementById('d-specs');
      p.specs.forEach(([label, val]) => {
        specsBody.innerHTML += `<tr><th>${label}</th><td>${val}</td></tr>`;
      });
    }

    // Related products
    const relatedGrid = document.getElementById('related-grid');
    Object.entries(PRODUCTS).filter(([k]) => parseInt(k) !== id).slice(0, 4).forEach(([k, rp]) => {
      relatedGrid.innerHTML += `
        <div class="col-6 col-md-3">
          <a href="product-detail.html?id=${k}" class="related-card d-block text-decoration-none">
            <img src="${rp.img}" alt="${rp.name}" class="related-img" />
            <div class="p-3">
              <div class="text-muted" style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#5b4fff!important">${rp.category}</div>
              <div class="fw-600 mt-1 mb-1" style="font-size:.9rem;line-height:1.3">${rp.name}</div>
              <div class="related-price">${rp.price}</div>
            </div>
          </a>
        </div>`;
    });

    // Quantity
    document.getElementById('btn-minus').addEventListener('click', () => {
      const q = document.getElementById('qty');
      if (parseInt(q.value) > 1) q.value = parseInt(q.value) - 1;
    });
    document.getElementById('btn-plus').addEventListener('click', () => {
      const q = document.getElementById('qty');
      if (parseInt(q.value) < 99) q.value = parseInt(q.value) + 1;
    });

    // Add to cart toast
    document.getElementById('btn-cart').addEventListener('click', () => {
      const toast = new bootstrap.Toast(document.getElementById('cartToast'), { delay: 2500 });
      toast.show();
    });
  </script>
</body>

</html>
